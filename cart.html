<style>
:root {
  --bg: #0b0b0f;
  --panel: rgba(255,255,255,0.08);
  --panel-strong: rgba(255,255,255,0.12);
  --text: #010814;
  --muted: rgba(245,247,251,0.68);
  --line: rgba(255,255,255,0.1);
  --accent: #ff4f8b;
  --accent-2: #8f7cff;
  --danger: #ff5f57;
  --ok: #30d158;
  --radius-xl: 28px;
  --radius-lg: 22px;
  --radius-md: 16px;
  --shadow: 0 20px 60px rgba(0,0,0,0.35);
  --container: 1140px;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Manrope", Arial, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(143,124,255,0.22), transparent 28%),
    radial-gradient(circle at bottom right, rgba(255,79,139,0.18), transparent 30%),
    linear-gradient(180deg, #0b0b0f, #12131a 45%, #0b0b0f);
}
img { display: block; max-width: 100%; }
a { color: inherit; }
button, input, textarea { font: inherit; }
:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

.container {
  width: min(calc(100% - 32px), var(--container));
  margin: 0 auto;
}

.display {
  font-family: "Anton", Arial, sans-serif;
  font-weight: 400;
  letter-spacing: 1.4px;
}

.page {
  padding: 28px 0 48px;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 22px;
}

.back-link,
.top-link {
  text-decoration: none;
  border: 1px solid var(--line);
  background: var(--panel);
  padding: 12px 16px;
  border-radius: 999px;
  transition: 0.2s ease;
}

.back-link:hover,
.top-link:hover {
  background: var(--panel-strong);
}

.page-title {
  margin: 0 0 12px;
  font-size: clamp(40px, 7vw, 74px);
}

.page-subtitle {
  margin: 0;
  color: var(--muted);
  max-width: 620px;
}

.layout {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 22px;
  margin-top: 28px;
}

.panel {
  border: 1px solid var(--line);
  background: var(--panel);
  backdrop-filter: blur(18px);
  box-shadow: var(--shadow);
  border-radius: var(--radius-xl);
}

.cart-panel {
  padding: 18px;
}

.cart-list {
  display: grid;
  gap: 14px;
}

.cart-item {
  display: grid;
  grid-template-columns: 88px 1fr auto;
  gap: 14px;
  align-items: center;
  border: 1px solid rgba(255,255,255,0.15);
  background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.06));
  border-radius: 22px;
  padding: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.1);
}


.cart-item img {
  width: 88px;
  height: 88px;
  object-fit: cover;
  border-radius: 18px;
  background: rgba(255,255,255,0.04);
}

.cart-item h3 {
  margin: 0 0 6px;
  font-size: 18px;
}

.cart-item p {
  margin: 0;
  color: var(--muted);
  font-size: 14px;
}

.item-controls {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
}

.qty-box {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.04);
  border-radius: 999px;
  padding: 6px;
}

.qty-btn,
.remove-btn,
.clear-btn,
.submit-btn,
.pay-btn {
  border: none;
  cursor: pointer;
  transition: 0.2s ease;
}

.qty-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  color: var(--text);
}

.qty-btn:hover,
.remove-btn:hover,
.clear-btn:hover,
.submit-btn:hover,
.pay-btn:hover {
  transform: translateY(-1px);
}

.qty-value {
  min-width: 24px;
  text-align: center;
  font-weight: 800;
}

.remove-btn {
  padding: 10px 14px;
  border-radius: 14px;
  background: rgba(255,95,87,0.14);
  color: #ffd5d3;
}

.summary-panel,
.form-panel {
  padding: 22px;
}

.summary-card {
  border: 1px solid rgba(255,255,255,0.15);
  background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.06));
  border-radius: 22px;
  padding: 18px;
  margin-bottom: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.summary-card h2,
.form-panel h2 {
  margin-top: 0;
}

.summary-row {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  color: var(--muted);
}

.summary-row:last-child {
  border-bottom: none;
  padding-bottom: 0;
}

.summary-total {
  font-size: 28px;
  font-weight: 800;
  margin: 18px 0 0;
}

.clear-btn,
.submit-btn,
.pay-btn {
  width: 100%;
  border-radius: 16px;
  padding: 15px 18px;
  font-weight: 800;
}

.clear-btn {
  background: rgba(255,255,255,0.08);
  color: var(--text);
  border: 1px solid var(--line);
}

.form-panel {
  display: grid;
  gap: 14px;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.input-group {
  display: grid;
  gap: 8px;
}

.input-group.full {
  grid-column: 1 / -1;
}

label {
  font-size: 14px;
  color: var(--muted);
}

input,
textarea {
  width: 100%;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.04);
  color: var(--text);
  padding: 14px 15px;
}

textarea {
  min-height: 110px;
  resize: vertical;
}

.payment-note {
  color: var(--muted);
  font-size: 14px;
  margin-top: -4px;
}

.submit-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white;
}

.pay-btn {
  background: linear-gradient(135deg, #ffffff, #d4daf8);
  color: #111;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none !important;
}

.empty {
  padding: 26px;
  border: 1px dashed rgba(255,255,255,0.16);
  border-radius: 22px;
  text-align: center;
  color: var(--muted);
}

.empty a {
  color: white;
}

.notice {
  padding: 14px 16px;
  border-radius: 16px;
  background: rgba(48,209,88,0.12);
  color: #d7ffe2;
  display: none;
}

.notice.error {
  background: rgba(255,95,87,0.14);
  color: #ffd5d3;
}

@media (max-width: 920px) {
  .layout,
  .form-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 640px) {
  .topbar {
    flex-direction: column;
    align-items: flex-start;
  }

  .cart-item {
    grid-template-columns: 1fr;
  }

  .item-controls {
    align-items: flex-start;
  }
}
</style>
</head>
<body>
  <main class="page">
    <div class="container">
      <div class="topbar">
        <a class="back-link" href="index.html">← Назад в магазин</a>
        <a class="top-link" href="https://t.me/NeverYork2" target="_blank" rel="noopener noreferrer">✈️ Telegram</a>
      </div>

      <h1 class="page-title display">Корзина</h1>
      <p class="page-subtitle">Проверь товары, укажи данные для доставки и оформи заказ за пару минут.</p>

      <div class="layout">
        <section class="panel cart-panel">
          <div class="cart-list" id="cartList"></div>
        </section>

        <aside>
          <section class="panel summary-panel">
            <div class="summary-card">
              <h2>Сводка заказа</h2>
              <div class="summary-row"><span>Товаров</span><strong id="summaryCount">0</strong></div>
              <div class="summary-row"><span>Позиции</span><strong id="summaryLines">0</strong></div>
              <div class="summary-total" id="summaryTotal">0 грн</div>
            </div>
            <button type="button" class="clear-btn" id="clearCartBtn">Очистить корзину</button>
          </section>

          <section class="panel form-panel">
            <h2>Оформление заказа</h2>
            <div class="notice" id="noticeBox"></div>

            <div class="form-grid">
              <div class="input-group">
                <label for="name">Имя</label>
                <input id="name" autocomplete="name" placeholder="Например, Андрей">
              </div>
              <div class="input-group">
                <label for="phone">Телефон</label>
                <input id="phone" type="tel" autocomplete="tel" placeholder="+380...">
              </div>
              <div class="input-group">
                <label for="city">Город</label>
                <input id="city" autocomplete="address-level2" placeholder="Киев">
              </div>
              <div class="input-group">
                <label for="post">Отделение Новой Почты</label>
                <input id="post" placeholder="Например, №12">
              </div>
              <div class="input-group full">
                <label for="comment">Комментарий</label>
                <textarea id="comment" placeholder="Размерные уточнения, пожелания по доставке и т.д."></textarea>
              </div>
            </div>

            <p class="payment-note">Сначала заказ уходит владельцу магазина. Если выберешь оплату на банку, после успешной отправки откроется ссылка на оплату.</p>

            <button type="button" class="submit-btn" id="cashBtn">Заказать с оплатой при получении</button>
            <button type="button" class="pay-btn" id="monoBtn">Оплатить сразу на Monobank</button>
          </section>
        </aside>
      </div>
    </div>
  </main>

<script src="products.js"></script>
<script>
const API_URL = "/send-order";
const MONO_URL = "https://send.monobank.ua/jar/3gUg3tUjvs";
const CART_KEY = "cart";

const cartList = document.getElementById("cartList");
const summaryCount = document.getElementById("summaryCount");
const summaryLines = document.getElementById("summaryLines");
const summaryTotal = document.getElementById("summaryTotal");
const noticeBox = document.getElementById("noticeBox");
const clearCartBtn = document.getElementById("clearCartBtn");
const cashBtn = document.getElementById("cashBtn");
const monoBtn = document.getElementById("monoBtn");

function safeParse(key, fallback) {
  try {
    return JSON.parse(localStorage.getItem(key)) || fallback;
  } catch {
    return fallback;
  }
}

let cart = safeParse(CART_KEY, []).filter((item) => item && item.id && findProduct(item.id));

function saveCart() {
  localStorage.setItem(CART_KEY, JSON.stringify(cart));
}

function formatPrice(value) {
  return `${value} грн`;
}

function getTotals() {
  let total = 0;
  let count = 0;

  cart.forEach((item) => {
    const product = findProduct(item.id);
    if (!product) return;
    total += product.price * item.qty;
    count += item.qty;
  });

  return {
    total,
    count,
    lines: cart.length
  };
}

function setNotice(message, isError = false) {
  noticeBox.textContent = message;
  noticeBox.style.display = "block";
  noticeBox.classList.toggle("error", isError);
}

function clearNotice() {
  noticeBox.textContent = "";
  noticeBox.style.display = "none";
  noticeBox.classList.remove("error");
}

function renderCart() {
  cartList.innerHTML = "";

  if (!cart.length) {
    cartList.innerHTML = `
      <div class="empty">
        Корзина пока пустая. <a href="index.html">Вернуться в каталог</a>
      </div>
    `;
  } else {
    cart.forEach((item, index) => {
      const product = findProduct(item.id);
      if (!product) return;

      const lineTotal = product.price * item.qty;
      const sizeLabel = item.size ? `Размер: ${item.size}` : "Без выбора размера";

      const row = document.createElement("article");
      row.className = "cart-item";
      row.innerHTML = `
        <img src="${product.images[0]}" alt="${product.name}">
        <div>
          <h3>${product.name}</h3>
          <p>${sizeLabel}</p>
          <p>${product.price} грн x ${item.qty} = ${lineTotal} грн</p>
        </div>
        <div class="item-controls">
          <div class="qty-box">
            <button type="button" class="qty-btn" data-action="dec" data-index="${index}">-</button>
            <span class="qty-value">${item.qty}</span>
            <button type="button" class="qty-btn" data-action="inc" data-index="${index}">+</button>
          </div>
          <button type="button" class="remove-btn" data-action="remove" data-index="${index}">Удалить</button>
        </div>
      `;
      cartList.appendChild(row);
    });
  }

  const totals = getTotals();
  summaryCount.textContent = String(totals.count);
  summaryLines.textContent = String(totals.lines);
  summaryTotal.textContent = formatPrice(totals.total);

  clearCartBtn.disabled = !cart.length;
  cashBtn.disabled = !cart.length;
  monoBtn.disabled = !cart.length;
}

cartList.addEventListener("click", (event) => {
  const btn = event.target.closest("[data-action]");
  if (!btn) return;

  const index = Number(btn.dataset.index);
  const action = btn.dataset.action;
  const item = cart[index];
  if (!item) return;

  if (action === "inc") {
    item.qty += 1;
  } else if (action === "dec") {
    item.qty -= 1;
    if (item.qty <= 0) {
      cart.splice(index, 1);
    }
  } else if (action === "remove") {
    cart.splice(index, 1);
  }

  saveCart();
  renderCart();
});

clearCartBtn.addEventListener("click", () => {
  cart = [];
  saveCart();
  clearNotice();
  renderCart();
});

function buildOrderText() {
  let total = 0;
  const lines = [];

  cart.forEach((item) => {
    const product = findProduct(item.id);
    if (!product) return;

    const lineTotal = product.price * item.qty;
    total += lineTotal;
    const sizeLabel = item.size ? ` (${item.size})` : "";
    lines.push(`${product.name}${sizeLabel} x ${item.qty} - ${lineTotal} грн`);
  });

  return {
    total,
    items: lines.join("\n")
  };
}

function validateForm() {
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const city = document.getElementById("city").value.trim();
  const post = document.getElementById("post").value.trim();
  const comment = document.getElementById("comment").value.trim();

  if (!cart.length) {
    return { ok: false, message: "Корзина пустая." };
  }

  if (!name || !phone || !city || !post) {
    return { ok: false, message: "Заполни имя, телефон, город и отделение Новой Почты." };
  }

  const phoneDigits = phone.replace(/\D/g, "");
  if (phoneDigits.length < 10) {
    return { ok: false, message: "Введи корректный телефон." };
  }

  return {
    ok: true,
    data: { name, phone, city, post, comment }
  };
}

function toggleButtons(disabled, activeButton, loadingText) {
  [cashBtn, monoBtn, clearCartBtn].forEach((button) => {
    button.disabled = disabled;
  });

  if (activeButton) {
    if (disabled) {
      activeButton.dataset.originalText = activeButton.textContent;
      activeButton.textContent = loadingText;
    } else if (activeButton.dataset.originalText) {
      activeButton.textContent = activeButton.dataset.originalText;
      delete activeButton.dataset.originalText;
    }
  }
}

async function checkout(paymentMethod, activeButton) {
  clearNotice();

  const validation = validateForm();
  if (!validation.ok) {
    setNotice(validation.message, true);
    return;
  }

  const order = buildOrderText();
  const payload = {
    ...validation.data,
    paymentMethod,
    items: order.items,
    total: order.total
  };

  try {
    toggleButtons(true, activeButton, "Отправка...");

    const response = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await response.json();

    if (!response.ok || !data.success) {
      throw new Error(data.reason || "email-error");
    }

    setNotice("Заказ успешно отправлен. Скоро с тобой свяжутся.");
    cart = [];
    saveCart();
    renderCart();

    if (paymentMethod === "Оплата на Monobank Банку") {
      window.location.href = MONO_URL;
    }
  } catch (error) {
    if (error.message === "no-credentials") {
      setNotice("На сервере не настроена почта. Проверь EMAIL_USER и EMAIL_PASS.", true);
    } else if (error.message === "email-error") {
      setNotice("Сервер не смог отправить письмо. Проверь пароль приложения Gmail.", true);
    } else if (error.message === "invalid-data" || error.message === "invalid-phone" || error.message === "invalid-cart") {
      setNotice("Проверь заполнение формы и состав корзины.", true);
    } else {
      setNotice("Не удалось отправить заказ. Проверь, что сервер запущен и доступен.", true);
    }
  } finally {
    toggleButtons(false, activeButton);
  }
}

cashBtn.addEventListener("click", () => checkout("Оплата при получении", cashBtn));
monoBtn.addEventListener("click", () => checkout("Оплата на Monobank Банку", monoBtn));

renderCart();
</script>
</body>
</html>
