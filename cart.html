<style>
:root{
  --bg:#0b0b0f;
  --panel:rgba(255,255,255,.07);
  --panel-hover:rgba(255,255,255,.11);
  --text:#f0f2f8;
  --muted:rgba(240,242,248,.62);
  --line:rgba(255,255,255,.09);
  --accent:#ff4f8b;
  --accent2:#8f7cff;
  --ok:#30d158;
  --danger:#ff5f57;
  --shadow:0 20px 60px rgba(0,0,0,.4);
  --r-xl:28px;--r-lg:22px;--r-md:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Manrope",Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 15% 0%,rgba(143,124,255,.2) 0%,transparent 30%),
    radial-gradient(circle at 90% 100%,rgba(255,79,139,.18) 0%,transparent 30%),
    #0b0b0f;
  min-height:100vh;
}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button,input,textarea{font:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px}

.wrap{width:min(calc(100% - 32px),1100px);margin:0 auto}
.display{font-family:"Anton",Arial,sans-serif;font-weight:400;letter-spacing:1.5px}

/* topbar */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  gap:16px;padding:24px 0 20px;flex-wrap:wrap;
}
.pill{
  display:inline-flex;align-items:center;gap:8px;
  border:1px solid var(--line);background:var(--panel);
  color:var(--text);padding:11px 15px;border-radius:999px;
  cursor:pointer;transition:.22s ease;white-space:nowrap;
}
.pill:hover{background:var(--panel-hover);transform:translateY(-1px)}

/* page title */
.page-title{font-size:clamp(38px,7vw,72px);margin-bottom:8px}
.page-sub{color:var(--muted);font-size:15px;margin-bottom:24px;max-width:580px;line-height:1.55}

/* layout */
.layout{display:grid;grid-template-columns:1.15fr .85fr;gap:22px;align-items:start}

/* cart items */
.cart-panel{
  border:1px solid var(--line);background:var(--panel);
  border-radius:var(--r-xl);padding:20px;
}
.cart-list{display:grid;gap:14px}
.cart-item{
  display:grid;grid-template-columns:90px 1fr auto;
  gap:14px;align-items:center;
  border:1px solid var(--line);background:rgba(255,255,255,.04);
  border-radius:var(--r-lg);padding:14px;
  transition:.2s ease;
}
.cart-item:hover{background:rgba(255,255,255,.07)}
.cart-item img{
  width:90px;height:90px;object-fit:cover;
  border-radius:15px;background:rgba(255,255,255,.05);flex-shrink:0;
}
.item-info h3{font-size:17px;margin-bottom:5px}
.item-info p{color:var(--muted);font-size:13px;line-height:1.5}
.item-controls{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.qty-box{
  display:inline-flex;align-items:center;gap:10px;
  border:1px solid var(--line);background:rgba(255,255,255,.05);
  border-radius:999px;padding:5px 8px;
}
.qty-btn{
  width:34px;height:34px;border-radius:50%;border:none;
  background:rgba(255,255,255,.09);color:var(--text);
  cursor:pointer;transition:.18s ease;font-size:18px;
  display:grid;place-items:center;
}
.qty-btn:hover{background:rgba(255,255,255,.18)}
.qty-val{min-width:22px;text-align:center;font-weight:800}
.remove-btn{
  padding:9px 13px;border-radius:13px;border:none;
  background:rgba(255,95,87,.14);color:#ffd5d3;
  cursor:pointer;font-size:13px;font-weight:700;transition:.18s ease;
}
.remove-btn:hover{background:rgba(255,95,87,.28)}
.empty-cart{
  padding:28px;border:1px dashed rgba(255,255,255,.14);
  border-radius:var(--r-lg);text-align:center;color:var(--muted);
}
.empty-cart a{color:var(--text);font-weight:700}

/* right panel */
.right-col{display:grid;gap:18px}
.summary-panel,.form-panel{
  border:1px solid var(--line);background:var(--panel);
  border-radius:var(--r-xl);padding:22px;
}
.panel-title{font-size:20px;margin-bottom:16px}
.summary-row{
  display:flex;justify-content:space-between;gap:12px;
  padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07);
  color:var(--muted);font-size:15px;
}
.summary-row:last-of-type{border-bottom:none}
.summary-total{font-size:30px;font-weight:800;margin:16px 0 0}
.clear-btn{
  width:100%;margin-top:14px;padding:13px;border-radius:var(--r-md);border:none;
  background:rgba(255,255,255,.07);color:var(--text);
  border:1px solid var(--line);cursor:pointer;font-weight:700;transition:.2s ease;
}
.clear-btn:hover{background:rgba(255,255,255,.13)}

/* form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.input-group{display:grid;gap:7px}
.input-group.full{grid-column:1/-1}
label{font-size:13px;color:var(--muted)}
input,textarea{
  width:100%;border-radius:14px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.06);
  color:var(--text);padding:13px 15px;
  transition:.2s ease;
}
input:focus,textarea:focus{
  border-color:rgba(255,255,255,.28);
  background:rgba(255,255,255,.09);
  outline:none;
}
textarea{min-height:100px;resize:vertical}
.payment-note{
  color:var(--muted);font-size:13px;
  margin-bottom:14px;line-height:1.55;
}
.submit-btn,.pay-btn{
  width:100%;border:none;border-radius:var(--r-md);
  padding:15px 18px;font-weight:800;cursor:pointer;
  transition:.22s ease;margin-bottom:10px;
}
.submit-btn{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
}
.pay-btn{
  background:linear-gradient(135deg,#fff,#dde2ff);
  color:#111;
}
.submit-btn:hover,.pay-btn:hover{transform:translateY(-2px)}
button:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* notice */
.notice{
  display:none;padding:13px 15px;border-radius:var(--r-md);
  font-size:14px;font-weight:700;margin-bottom:14px;line-height:1.5;
}
.notice.ok{background:rgba(48,209,88,.12);color:#c5ffe0}
.notice.err{background:rgba(255,95,87,.14);color:#ffd5d3}

/* responsive */
@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .cart-item{grid-template-columns:1fr;gap:10px}
  .item-controls{align-items:flex-start}
}
</style>
</head>

<div class="wrap">
  <div class="topbar">
    <a class="pill" href="index.html">← Назад в магазин</a>
    <a class="pill" href="https://t.me/NeverYork2" target="_blank" rel="noopener">✈️ Telegram</a>
  </div>

  <h1 class="page-title display">Корзина</h1>
  <p class="page-sub">Проверь товары, укажи данные — и оформи заказ за пару минут.</p>

  <div class="layout">
    <!-- LEFT: cart items -->
    <section class="cart-panel">
      <div class="cart-list" id="cartList"></div>
    </section>

    <!-- RIGHT: summary + form -->
    <aside class="right-col">

      <section class="summary-panel">
        <div class="panel-title display">Сводка</div>
        <div class="summary-row"><span>Позиций</span><strong id="sumLines">0</strong></div>
        <div class="summary-row"><span>Товаров</span><strong id="sumCount">0</strong></div>
        <div class="summary-total" id="sumTotal">0 грн</div>
        <button type="button" class="clear-btn" id="clearBtn">Очистить корзину</button>
      </section>

      <section class="form-panel">
        <div class="panel-title display">Оформление заказа</div>
        <div class="notice" id="notice"></div>

        <div class="form-grid">
          <div class="input-group">
            <label for="name">Имя</label>
            <input id="name" autocomplete="name" placeholder="Например, Андрей">
          </div>
          <div class="input-group">
            <label for="phone">Телефон</label>
            <input id="phone" type="tel" autocomplete="tel" placeholder="+380...">
          </div>
          <div class="input-group">
            <label for="city">Город</label>
            <input id="city" autocomplete="address-level2" placeholder="Киев">
          </div>
          <div class="input-group">
            <label for="post">Отделение Новой Почты</label>
            <input id="post" placeholder="Например, №12">
          </div>
          <div class="input-group full">
            <label for="comment">Комментарий</label>
            <textarea id="comment" placeholder="Уточнения по размеру, доставке и т.д."></textarea>
          </div>
        </div>

        <p class="payment-note">После отправки заказ сразу уходит владельцу магазина. Если выберешь оплату на банку — откроется ссылка Monobank.</p>

        <button type="button" class="submit-btn" id="cashBtn">Заказать с оплатой при получении</button>
        <button type="button" class="pay-btn" id="monoBtn">Оплатить сразу на Monobank</button>
      </section>

    </aside>
  </div>
</div>

<script>
// ─── ВАЖНО ───────────────────────────────────────────────────────────────────
// API_URL указан как полный адрес localhost:3000, чтобы сайт работал
// через любой Run / Live Server в VS Code без дополнительных настроек.
// Перед деплоем на хостинг замени на относительный путь: "/send-order"
// ─────────────────────────────────────────────────────────────────────────────
const API_URL  = "http://localhost:3000/send-order";
const MONO_URL = "https://send.monobank.ua/jar/3gUg3tUjvs";
const CART_KEY = "skiple_cart";

function load(key,fb){ try{ return JSON.parse(localStorage.getItem(key))||fb }catch{ return fb } }
function save(key,v){ localStorage.setItem(key,JSON.stringify(v)) }
function getCart(){ return load(CART_KEY,[]).filter(i=>i&&i.id&&findProduct(i.id)) }

let cart = getCart();
function saveCart(){ save(CART_KEY,cart) }

/* summary */
function updateSummary(){
  let total=0, count=0;
  cart.forEach(i=>{ const p=findProduct(i.id); if(!p) return; total+=p.price*i.qty; count+=i.qty; });
  document.getElementById("sumLines").textContent = cart.length;
  document.getElementById("sumCount").textContent = count;
  document.getElementById("sumTotal").textContent = total+" грн";
  const empty = cart.length===0;
  document.getElementById("clearBtn").disabled = empty;
  document.getElementById("cashBtn").disabled  = empty;
  document.getElementById("monoBtn").disabled  = empty;
}

/* render */
function render(){
  const list = document.getElementById("cartList");
  list.innerHTML="";
  if(!cart.length){
    list.innerHTML=`<div class="empty-cart">Корзина пустая. <a href="index.html">Вернуться в каталог</a></div>`;
    updateSummary(); return;
  }
  cart.forEach((item,idx)=>{
    const p = findProduct(item.id);
    if(!p) return;
    const line = p.price * item.qty;
    const sizeLabel = item.size ? `Размер: ${item.size} · ` : "";
    const el = document.createElement("div");
    el.className="cart-item";
    el.innerHTML=`
      <img src="${p.images[0]}" alt="${p.name}">
      <div class="item-info">
        <h3>${p.name}</h3>
        <p>${sizeLabel}${p.price} грн × ${item.qty} = <strong>${line} грн</strong></p>
      </div>
      <div class="item-controls">
        <div class="qty-box">
          <button class="qty-btn" data-a="dec" data-i="${idx}">−</button>
          <span class="qty-val">${item.qty}</span>
          <button class="qty-btn" data-a="inc" data-i="${idx}">+</button>
        </div>
        <button class="remove-btn" data-a="rm" data-i="${idx}">Удалить</button>
      </div>`;
    list.appendChild(el);
  });
  updateSummary();
}

document.getElementById("cartList").addEventListener("click",e=>{
  const btn = e.target.closest("[data-a]");
  if(!btn) return;
  const i=+btn.dataset.i, a=btn.dataset.a;
  if(a==="inc") cart[i].qty++;
  else if(a==="dec"){ cart[i].qty--; if(cart[i].qty<=0) cart.splice(i,1); }
  else if(a==="rm") cart.splice(i,1);
  saveCart(); render();
});

document.getElementById("clearBtn").addEventListener("click",()=>{ cart=[]; saveCart(); render(); });

/* notice */
function showNotice(msg, isErr=false){
  const el = document.getElementById("notice");
  el.textContent=msg;
  el.className="notice "+(isErr?"err":"ok");
  el.style.display="block";
}
function hideNotice(){ document.getElementById("notice").style.display="none"; }

/* checkout */
function validate(){
  const name  = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const city  = document.getElementById("city").value.trim();
  const post  = document.getElementById("post").value.trim();
  if(!cart.length)         return {ok:false,msg:"Корзина пустая."};
  if(!name||!phone||!city||!post) return {ok:false,msg:"Заполни имя, телефон, город и отделение НП."};
  if(phone.replace(/\D/g,"").length<10) return {ok:false,msg:"Введи корректный номер телефона."};
  return {ok:true, data:{name,phone,city,post, comment:document.getElementById("comment").value.trim()}};
}

function buildItems(){
  let total=0, lines=[];
  cart.forEach(i=>{
    const p=findProduct(i.id); if(!p) return;
    const lt=p.price*i.qty; total+=lt;
    lines.push(`${p.name}${i.size?` (${i.size})`:""} × ${i.qty} = ${lt} грн`);
  });
  return {total, items:lines.join("\n")};
}

function lockButtons(active, label){
  [document.getElementById("cashBtn"),document.getElementById("monoBtn"),document.getElementById("clearBtn")]
    .forEach(b=>b.disabled=true);
  if(active){ active._orig=active.textContent; active.textContent=label; }
}
function unlockButtons(active){
  [document.getElementById("cashBtn"),document.getElementById("monoBtn"),document.getElementById("clearBtn")]
    .forEach(b=>b.disabled=false);
  if(active&&active._orig) active.textContent=active._orig;
}

async function checkout(payMethod, btn){
  hideNotice();
  const v=validate();
  if(!v.ok){ showNotice(v.msg,true); return; }
  const order=buildItems();
  lockButtons(btn,"Отправка...");
  try{
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({...v.data, paymentMethod:payMethod, items:order.items, total:order.total})
    });
    const data = await res.json();
    if(!res.ok||!data.success) throw new Error(data.reason||"email-error");
    showNotice("✅ Заказ отправлен! Скоро с тобой свяжутся.");
    cart=[]; saveCart(); render();
    if(payMethod==="Оплата на Monobank") window.location.href=MONO_URL;
  } catch(err){
    const msgs={
      "no-credentials":"На сервере не настроена почта (.env).",
      "email-error":"Сервер не смог отправить письмо. Проверь пароль Gmail.",
      "invalid-data":"Проверь заполнение формы.",
    };
    showNotice(msgs[err.message]||"Ошибка соединения. Проверь, что сервер запущен на порту 3000.", true);
  } finally{
    unlockButtons(btn);
  }
}

document.getElementById("cashBtn").addEventListener("click",function(){ checkout("Оплата при получении",this) });
document.getElementById("monoBtn").addEventListener("click",function(){ checkout("Оплата на Monobank",this) });

render();
</script>
</body>
</html>
